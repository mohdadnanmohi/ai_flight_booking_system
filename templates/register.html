{% extends 'base.html' %}
{% block title %}Register - Gradious Flights{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 3rem;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-secondary" style="font-size: 3rem; text-shadow: 0 0 15px var(--secondary-glow);"></i>
                <h2 class="mt-2">Create Account</h2>
                <p class="text-muted">Start booking flights and receiving AI insights</p>
            </div>
            
            <form action="{{ url_for('register') }}" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label-custom">Full Name</label>
                    <input type="text" class="form-control form-control-custom" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label-custom">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label-custom">Phone Number</label>
                    <input type="tel" class="form-control form-control-custom" id="phone" name="phone" placeholder="+1 (555) 019-2834" required>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label-custom">Account Type (Testing Mode Enabled)</label>
                    <select class="form-select form-control-custom" id="role" name="role" required>
                        <option value="User">Passenger (Standard User)</option>
                        <option value="Admin">Administrator (Flight Manager)</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label-custom">Password</label>
                        <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="confirm_password" class="form-label-custom">Confirm Password</label>
                        <input type="password" class="form-control form-control-custom" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-3 mt-3">
                    <i class="bi bi-check-circle"></i> Complete Registration
                </button>
            </form>

            <div class="text-center mt-4 border-top pt-3" style="border-color: var(--border-color) !important;">
                <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-secondary text-decoration-none fw-semibold">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
